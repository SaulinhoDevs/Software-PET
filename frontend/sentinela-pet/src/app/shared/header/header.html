<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=download" />

<header class="header">
  <!-- Botão Assistente Virtual -->
  <button class="componente-exportacao">
    <span class="material-symbols-outlined">
      download
    </span>
    Exportar busca ativa (CSV)
  </button>

  <!-- Profile -->
  <div class="profile-container">
    <span class="profile-name">{{ userName }}</span>
    <div class="profile-avatar" [style.background]="avatarColor">
      <span class="avatar-initials">{{ userInitials }}</span>
    </div>
  </div>
</header>
