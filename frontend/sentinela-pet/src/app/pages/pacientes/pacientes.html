<main class="container">

  <section class="page-header">
    <div class="page-title">
      <h1>Pacientes</h1>
      <p>Visualize, pesquise e gerencie os pacientes cadastrados no sistema.</p>
    </div>

    <button class="btn-new" (click)="cadastrarNovoPaciente()">
      + Cadastrar Novo Paciente
    </button>
  </section>

  <section class="search-area">
    <input type="text" class="search-input" placeholder="Digite o Nome, CNS ou CPF para encontrar"
      [(ngModel)]="termoPesquisa" />
  </section>

  <section class="patients-list" *ngIf="pacientesFiltrados.length > 0; else semPacientes">

    <div class="patient-card" *ngFor="let paciente of pacientesFiltrados">

      <div class="patient-info">
        <h2 class="patient-name">
          {{ paciente.nome }}
        </h2>

        <div class="patient-data">

          <div class="data-item">
            <span class="data-label">CNS</span>
            <span class="data-value">
              {{ paciente.cns }}
            </span>
          </div>

          <div class="data-item">
            <span class="data-label">CPF</span>
            <span class="data-value">
              {{ formatarCpf(paciente.cpf) }}
            </span>
          </div>

          <div class="data-item">
            <span class="data-label">Faltas</span>
            <span class="data-value" [class.faltas-alerta]="paciente.countFaltas >= 3">
              {{ paciente.countFaltas }}
            </span>
          </div>

        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-details" (click)="verDetalhes(paciente.id)">
          Detalhes
        </button>

        <button class="btn btn-edit" (click)="editarPaciente(paciente.id)">
          Editar
        </button>
      </div>

    </div>

  </section>

  <ng-template #semPacientes>
    <div class="empty-message">
      Nenhum paciente encontrado.
    </div>
  </ng-template>

</main>
