<div class="login-page">

  <div class="login-card">

    <div class="login-form-section">

      <div class="login-content">

        <h1 class="login-title">Login</h1>

        <div class="subheader-container">
          <ul class="subheader-flip">
            <li>
              <div>Gerencie sua <span>Unidade</span></div>
            </li>
            <li>
              <div>Monitore sua <span>População</span></div>
            </li>
            <li>
              <div>Fortaleça o <span>Cuidado</span></div>
            </li>
          </ul>
        </div>

        <form>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seuemail@exemplo.com">
          </div>

          <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Sua senha">
          </div>

          <button type="submit" class="btn-login">
            <span class="material-symbols-outlined">
              login
            </span>
            Entrar
          </button>

        </form>

      </div>

    </div>

    <div class="login-banner-section">

      <div class="banner-content">

        <div class="logo-circle">
          <span class="material-symbols-outlined logo-icon">
            diversity_1
          </span>
        </div>

        <h2 class="logo-text">
          SIBRAPS
        </h2>

        <p class="banner-description">
          Sistema de Busca Ativa da RAPS
        </p>

      </div>

    </div>

  </div>

</div>
